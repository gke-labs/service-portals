syntax = "proto3";

package portals;

option go_package = "github.com/gke-labs/service-portals/pkg/portals/proto";

message RuleSpec {
  string host = 1;
  string rewrite_url = 2;
  string auth_token = 3;
  string auth_header = 4;
  string cache_ttl = 5;
}

message Metadata {
  string name = 1;
}

message PortalRule {
  Metadata metadata = 1;
  RuleSpec spec = 2;
}

message UpdateRulesRequest {
  repeated PortalRule rules = 1;
}

message UpdateRulesResponse {}

message ListRulesRequest {}

message ListRulesResponse {
  repeated PortalRule rules = 1;
}

message SecurityPolicy {
  bool block_exec = 1;
  repeated string allowed_images = 2;
}

message SetSecurityPolicyRequest {
  SecurityPolicy policy = 1;
}

message SetSecurityPolicyResponse {}

message GetSecurityPolicyRequest {}

message GetSecurityPolicyResponse {
  SecurityPolicy policy = 1;
}

service SidecarReconfigurator {
  rpc UpdateRules(UpdateRulesRequest) returns (UpdateRulesResponse);
  rpc ListRules(ListRulesRequest) returns (ListRulesResponse);
  rpc SetSecurityPolicy(SetSecurityPolicyRequest) returns (SetSecurityPolicyResponse);
  rpc GetSecurityPolicy(GetSecurityPolicyRequest) returns (GetSecurityPolicyResponse);
}
