apiVersion: v1
kind: Secret
metadata:
  name: all-in-one-portal-sidecar-secret
stringData:
  gemini-token: gemini-api-key-here
  github-token: github-token-here
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workload-with-sidecar
  labels:
    app: workload-with-sidecar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workload-with-sidecar
  template:
    metadata:
      labels:
        app: workload-with-sidecar
    spec:
      # Use hostAliases to map backend hostnames to dummy IPs so that they resolve
      # in the pod and trigger TCP connection attempts on port 80/443, which are then
      # transparently intercepted by iptables.
      hostAliases:
      - ip: "8.8.8.8" # or any arbitrary IP; iptables will intercept all TCP traffic on target ports
        hostnames:
        - "gemini.backend"
        - "github.backend"

      initContainers:
      # The init container configures the iptables rules within the shared pod
      # network namespace. It requires NET_ADMIN capability and root user.
      - name: init-iptables
        image: init-iptables:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: PROXY_PORT
          value: "8080"
        - name: PROXY_UID
          value: "1337"
        - name: INTERCEPT_PORTS
          value: "80,443"
        securityContext:
          capabilities:
            add: ["NET_ADMIN"]
          runAsUser: 0
          runAsGroup: 0
          privileged: false

      containers:
      # 1. The Workload Container: representing the actual application that is consuming
      # external services. It has no access to the API tokens, and simply makes
      # standard HTTP requests to `http://gemini.backend`.
      # NOTE: Ensure the workload container is not configured to run as the proxy UID (1337).
      # If the workload container runs as UID 1337, its outbound traffic would bypass the 
      # redirection rules.
      - name: workload
        image: alpine:latest
        command: ["/bin/sh", "-c"]
        # In a real environment, this would run the workload. We sleep here to keep the pod running.
        args: ["while true; do sleep 3600; done"]

      # 2. The Sidecar Container: runs the all-in-one-portal proxy.
      # It must run as the specified non-root user (UID 1337) matching PROXY_UID so that
      # its outbound requests are not intercepted and redirected to itself.
      - name: service-portal-sidecar
        image: all-in-one-portal:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 1337
          runAsGroup: 1337
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
        ports:
        - containerPort: 8080
          name: proxy
        env:
        - name: SERVICE_NAMES
          value: "gemini,github"
        - name: GEMINI_TARGET_URL
          value: "https://generativelanguage.googleapis.com"
        - name: GEMINI_HOST
          value: "gemini.backend"
        - name: GEMINI_AUTH_HEADER
          value: "Authorization"
        - name: GEMINI_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: all-in-one-portal-sidecar-secret
              key: gemini-token
        - name: GITHUB_TARGET_URL
          value: "https://api.github.com"
        - name: GITHUB_HOST
          value: "github.backend"
        - name: GITHUB_AUTH_HEADER
          value: "Authorization"
        - name: GITHUB_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: all-in-one-portal-sidecar-secret
              key: github-token
