version: 2
updates:
  # Maintain Go dependencies and Go versions in go.mod
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"

  # Maintain Docker base image versions in all Dockerfiles recursively
  - package-ecosystem: "docker"
    directories:
      - "/**"
    schedule:
      interval: "weekly"

  # Maintain GitHub Actions dependencies in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
